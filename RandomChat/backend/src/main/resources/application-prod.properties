spring.application.name=backend

# ─── PostgreSQL (Neon — free) ─────────────────────────
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── File Uploads ──────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Redis (Upstash — free) ───────────────────────────
spring.data.redis.host=${UPSTASH_REDIS_HOST}
spring.data.redis.port=${UPSTASH_REDIS_PORT}
spring.data.redis.password=${UPSTASH_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=2000ms

# ─── Cloudinary (free — 25GB) ─────────────────────────
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ─── Razorpay Payment Gateway ────────────────────────
razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET}
razorpay.premium_amount=29900
razorpay.currency=INR

# ─── Server ───────────────────────────────────────────
server.port=${PORT:8080}
